<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{Tool}} — Cheatsheet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #1a1b26;
    --bg-dark: #16161e;
    --bg-soft: #1f2335;
    --panel: #24283b;
    --fg: #c0caf5;
    --fg-dim: #565f89;

    --rule: #2f3549;

    --red: #f7768e;
    --green: #9ece6a;
    --yellow: #e0af68;
    --blue: #7aa2f7;
    --purple: #bb9af7;
    --aqua: #7dcfff;
    --orange: #ff9e64;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
  }

  body {
    margin: 0;
    background: var(--bg-dark);
    color: var(--fg);
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
    padding: 22px 28px 20px;
    display: flex;
    justify-content: center;
  }

  .sheet {
    width: 100%;
    max-width: 2320px;
  }

  .statusbar {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--bg-soft);
    border: 1px solid var(--rule);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
  }
  .statusbar .seg {
    padding: 8px 16px;
    white-space: nowrap;
    border-right: 1px solid var(--rule);
  }
  .statusbar .seg.active {
    background: var(--blue);
    color: var(--bg-dark);
    font-weight: 700;
  }
  .statusbar .seg.title {
    flex: 1;
    text-align: right;
    color: var(--fg-dim);
    letter-spacing: 0.02em;
  }
  .statusbar .seg .dim { color: var(--fg-dim); }

  .titlerow {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  h1 {
    font-family: 'Inter', sans-serif;
    font-size: 24px;
    font-weight: 800;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .subtitle {
    color: var(--fg-dim);
    font-size: 13px;
    margin: 0;
  }
  .subtitle code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg-soft);
    padding: 1px 6px;
    border-radius: 4px;
    color: var(--aqua);
  }

  .modes {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 1fr;
    gap: 14px;
  }

  @media (max-width: 1200px) {
    .modes { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    .modes { grid-template-columns: 1fr; }
  }

  .mode-card {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 8px;
    overflow: hidden;
  }
  .mode-card.wide {
    grid-column: span 4;
  }
  @media (max-width: 1200px) {
    .mode-card.wide { grid-column: span 2; }
  }
  @media (max-width: 640px) {
    .mode-card.wide { grid-column: span 1; }
  }

  .mode-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-bottom: 1px solid var(--rule);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .mode-head .count {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    opacity: 0.65;
    font-size: 10.5px;
  }

  .rows {
    padding: 4px 8px;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 4px;
    border-bottom: 1px solid var(--bg-soft);
  }
  .row:last-child { border-bottom: none; }

  .keys {
    display: flex;
    gap: 3px;
    flex: 0 0 auto;
    min-width: 100px;
  }
  .key {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    font-weight: 700;
    color: var(--fg);
    background: linear-gradient(180deg, #2a2f45, #24283b);
    border: 1px solid var(--rule);
    border-bottom: 2px solid #10111a;
    border-radius: 4px;
    padding: 2px 6px;
    line-height: 1.35;
    white-space: nowrap;
  }
  .desc {
    font-size: 12px;
    color: var(--fg-dim);
  }
  /* marker for personal (non-default) bindings — source rows ending in "(custom)" */
  .desc .custom {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--orange);
    border: 1px solid var(--orange);
    border-radius: 3px;
    padding: 0 4px;
    margin-left: 6px;
  }

  .wide .rows {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 0 10px;
  }
  @media (max-width: 1200px) {
    .wide .rows { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 640px) {
    .wide .rows { grid-template-columns: 1fr; }
  }

  footer {
    margin-top: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: var(--fg-dim);
    text-align: center;
    letter-spacing: 0.03em;
  }

  /* ==========================================================================
     SHEET-SPECIFIC STYLES — everything below this line belongs to one sheet
     and is written per sheet at generation time:
       - accent mapping: one palette color per card head, e.g.
           .mode-normal .mode-head { color: var(--bg-dark); background: var(--green); }
       - hand-tuned grid placement (.pos-* classes, wrapper grids)
       - flourishes: decorative elements unique to the tool
     ========================================================================== */
</style>
</head>
<body>
  <div class="sheet">

    <div class="statusbar">
      <div class="seg active">{{BADGE}}</div>
      <div class="seg dim">{{tool}}</div>
      <div class="seg dim">{{context, e.g. config path}}</div>
      <div class="seg title">{{sheet title, lowercase}}</div>
    </div>

    <div class="titlerow">
      <h1>{{Sheet Title}}</h1>
      <p class="subtitle">{{Subtitle — inline <code>code</code> allowed}}</p>
    </div>

    <div class="modes">

      <!-- one .mode-card per H2 in src/<tool>/<tool>.md; add per-sheet accent / pos-* classes -->
      <div class="mode-card mode-example">
        <div class="mode-head">{{Card Title}} <span class="count">{{head note}}</span></div>
        <div class="rows">
          <div class="row"><div class="keys"><span class="key">{{key}}</span><span class="key">{{key}}</span></div><div class="desc">{{action}}</div></div>
          <div class="row"><div class="keys"><span class="key">{{key}}</span></div><div class="desc">{{action}} <span class="custom">custom</span></div></div>
        </div>
      </div>

    </div>

    <footer>{{footer line}}</footer>
  </div>
</body>
</html>
